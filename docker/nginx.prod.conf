events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml application/wasm;

    upstream api {
        server api:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options    nosniff;
        add_header X-Frame-Options           SAMEORIGIN;
        add_header Referrer-Policy           strict-origin-when-cross-origin;

        # ── API proxy (REST) ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api/api/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
        }

        # ── WebSocket (submission pipeline streaming) ────────────────────────
        location /api/v1/ws/ {
            proxy_pass         http://api/api/v1/ws/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── React SPA static files ───────────────────────────────────────────
        location / {
            proxy_pass http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # SPA: forward 404s to index.html
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend/index.html;
        }

        # ── Cache-Control for hashed static assets ───────────────────────────
        location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
