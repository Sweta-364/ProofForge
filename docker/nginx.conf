events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── API proxy (REST + WebSocket) ─────────────────────────────────────
        location /api/ {
            proxy_pass         http://api/api/;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for submission pipeline (up to ~35s)
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
        }

        # ── WebSocket endpoint ────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://api/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ── React SPA (static files) ──────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            # SPA routing: serve index.html for all non-file paths
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively (Vite outputs content-hashed filenames)
            location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
