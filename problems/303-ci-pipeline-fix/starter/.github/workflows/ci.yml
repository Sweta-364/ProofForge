# BROKEN: invalid trigger, no checkout step, hardcoded live token.
name: CI

on: pull-request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          API_TOKEN: "sk-live-1234abcd"
        run: pytest -q
