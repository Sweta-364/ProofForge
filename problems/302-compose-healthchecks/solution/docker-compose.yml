services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app-password
      POSTGRES_DB: shop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d shop"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    image: shopapi:1.4
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://app:app-password@db:5432/shop
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
